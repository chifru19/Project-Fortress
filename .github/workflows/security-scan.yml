name: Security Scan
on: [push]

jobs:
  checkov-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          # Framework MUST be 'all' or 'dockerfile' to avoid the exit error
          framework: all 
          quiet: true
